<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>설문 결과</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0d;
      --surface: #161616;
      --border: #2a2a2a;
      --accent: #c8f97a;
      --text: #f0f0f0;
      --muted: #888;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Noto Sans KR', sans-serif;
      padding: 40px 20px;
    }

    .container { max-width: 900px; margin: 0 auto; }

    .header { margin-bottom: 40px; }
    .header .tag { font-size: 11px; font-weight: 600; letter-spacing: 3px; text-transform: uppercase; color: var(--accent); margin-bottom: 16px; }
    .header h1 { font-family: 'Playfair Display', serif; font-size: clamp(28px, 5vw, 44px); }
    .header p { margin-top: 8px; color: var(--muted); font-size: 14px; }

    .stats-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 12px;
      margin-bottom: 32px;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      text-align: center;
    }

    .stat-card .num {
      font-size: 36px;
      font-weight: 700;
      color: var(--accent);
      line-height: 1;
    }

    .stat-card .label {
      font-size: 12px;
      color: var(--muted);
      margin-top: 6px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(380px, 1fr));
      gap: 16px;
    }

    .chart-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 28px;
    }

    .chart-title {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 20px;
    }

    canvas { max-height: 240px; }

    .back-link {
      display: inline-block;
      margin-top: 32px;
      font-size: 13px;
      color: var(--muted);
      text-decoration: none;
    }

    .back-link:hover { color: var(--accent); }

    .loading {
      text-align: center;
      padding: 80px;
      color: var(--muted);
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="tag">📊 Live Results</div>
      <h1>설문 결과 대시보드</h1>
      <p id="updated">데이터를 불러오는 중...</p>
    </div>

    <div class="stats-row" id="statsRow">
      <div class="loading">로딩 중...</div>
    </div>

    <div class="grid" id="chartsGrid"></div>

    <a href="/" class="back-link">← 설문 참여하기</a>
  </div>

  <script>
    const COLORS = ['#c8f97a','#7af9c8','#7ac8f9','#f9c87a','#f97a7a','#c87af9'];

    const chartDefaults = {
      plugins: {
        legend: { labels: { color: '#f0f0f0', font: { family: 'Noto Sans KR', size: 12 }, padding: 16 } }
      }
    };

    function makeBar(ctx, labels, data, label) {
      return new Chart(ctx, {
        type: 'bar',
        data: {
          labels,
          datasets: [{ label, data, backgroundColor: COLORS.slice(0, data.length), borderRadius: 6, borderSkipped: false }]
        },
        options: {
          ...chartDefaults,
          responsive: true,
          scales: {
            x: { ticks: { color: '#888', font: { family: 'Noto Sans KR' } }, grid: { color: '#222' } },
            y: { ticks: { color: '#888', font: { family: 'Noto Sans KR' }, stepSize: 1 }, grid: { color: '#222' }, beginAtZero: true }
          }
        }
      });
    }

    function makeDoughnut(ctx, labels, data) {
      return new Chart(ctx, {
        type: 'doughnut',
        data: {
          labels,
          datasets: [{ data, backgroundColor: COLORS.slice(0, data.length), borderWidth: 0, hoverOffset: 8 }]
        },
        options: {
          ...chartDefaults,
          responsive: true,
          cutout: '65%'
        }
      });
    }

    async function loadResults() {
      try {
        const res = await fetch('/api/results');
        const d = await res.json();

        // 통계 카드
        document.getElementById('statsRow').innerHTML = `
          <div class="stat-card"><div class="num">${d.total}</div><div class="label">총 응답 수</div></div>
          <div class="stat-card"><div class="num">${Object.keys(d.age_group).length}</div><div class="label">연령대 분포</div></div>
          <div class="stat-card"><div class="num">${topKey(d.satisfaction)}</div><div class="label">최다 만족도</div></div>
          <div class="stat-card"><div class="num">${topKey(d.frequency)}</div><div class="label">주요 이용빈도</div></div>
        `;

        document.getElementById('updated').textContent = `마지막 업데이트: ${new Date().toLocaleString('ko-KR')}`;

        const grid = document.getElementById('chartsGrid');
        grid.innerHTML = '';

        // 차트 정의
        const charts = [
          { title: '연령대 분포', data: d.age_group, type: 'bar', label: '응답자 수' },
          { title: '만족도', data: d.satisfaction, type: 'doughnut' },
          { title: '이용 빈도', data: d.frequency, type: 'bar', label: '응답자 수' },
          { title: '추천 여부', data: d.recommend, type: 'doughnut' }
        ];

        charts.forEach(({ title, data, type, label }) => {
          const labels = Object.keys(data);
          const values = Object.values(data);
          if (labels.length === 0) return;

          const card = document.createElement('div');
          card.className = 'chart-card';
          card.innerHTML = `<div class="chart-title">${title}</div><canvas></canvas>`;
          grid.appendChild(card);

          const ctx = card.querySelector('canvas').getContext('2d');
          if (type === 'doughnut') makeDoughnut(ctx, labels, values);
          else makeBar(ctx, labels, values, label);
        });

      } catch (e) {
        document.getElementById('statsRow').innerHTML = `<div class="loading">오류: ${e.message}</div>`;
      }
    }

    function topKey(obj) {
      if (!obj || Object.keys(obj).length === 0) return '-';
      return Object.entries(obj).sort((a, b) => b[1] - a[1])[0][0];
    }

    loadResults();
    // 30초마다 자동 갱신
    setInterval(loadResults, 30000);
  </script>
</body>
</html>
